apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: spring-boot-k8s1
  namespace: argocd # The namespace where Argo CD is installed
spec:
  project: default
  source:
    repoURL: https://github.com/skseth/gitops-dev.git
    targetRevision: HEAD
    path: apps/spring-boot-k8s-1/base
  destination:
    server: https://kubernetes.default.svc
    namespace: apps
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true 