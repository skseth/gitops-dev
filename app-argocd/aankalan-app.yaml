  apiVersion: argoproj.io/v1alpha1
  kind: Application
  metadata:
    name: aankalan
    namespace: argocd
  spec:
    project: default
    source:
      repoURL: 'https://github.com/skseth/gitops-dev.git'
      targetRevision: HEAD
      path: app-kustomize/k8s/overlays/dev
    destination:
      server: https://kubernetes.default.svc
      namespace: apps
    syncPolicy:
      automated:
        prune: true
        selfHeal: true
      syncOptions:
        - CreateNamespace=true 