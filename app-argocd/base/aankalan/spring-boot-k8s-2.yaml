apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: spring-boot-k8s-2
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/skseth/gitops-dev.git'
    targetRevision: HEAD
    path: app-kustomize/aankalan/spring-boot-k8s-2/base
  destination:
    server: https://kubernetes.default.svc
    namespace: apps
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true 
